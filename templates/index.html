<!DOCTYPE html>
<html>
<head>
    <title>Campaign Map</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #controls {
            margin-bottom: 10px;
        }

        button {
            margin-right: 10px;
            padding: 8px 12px;
        }

        #mapCanvas {
            border: 1px solid black;
            display: block;
        }

        #hexInfo {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            width: 350px;
        }

        #adminPanel {
            display: none;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #444;
            width: 300px;
            background: #f8f8f8;
        }
    </style>
</head>

<body>

<h1>Campaign Map</h1>

<!-- ✅ THIS is where the admin button goes -->
<div id="controls">

    <button id="adminBtn">
        Admin Panel
    </button>

    <button id="toggleLabels">
        Hex Labels
    </button>

    <button id="toggleRegions">
        Region Overlay
    </button>

</div>

<!-- Admin login panel (hidden by default) -->
<div id="adminPanel">

    <h3>Admin Login</h3>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="loginAdmin()">
        Login
    </button>

</div>

<canvas id="mapCanvas"></canvas>

<div id="hexInfo">
    Click a hex.
</div>

<script src="/static/map.js"></script>

</body>
</html>
